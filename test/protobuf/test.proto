syntax = "proto3"; // 声明protobuf版本

package fixbug; // 定义包名 , 对于c++来说，包名会被转换成命名空间

// protobuf 的数据类型:
// double float int32 int64 uint32 uint64 sint32 sint64 fixed32 fixed64 sfixed32 sfixed64 bool string bytes
message LoginRequest
{
    string name = 1; // 用户名
    string password = 2; // 密码
};

message LoginResponse
{
    ResultCode result = 1; // 响应结果
    bool success = 2; // 是否登录成功
};

message GetFriendListRequest
{
    uint32 userid = 1; // 用户id
};

message ResultCode
{
    int32 errcode = 1; // 错误码
    bytes errmsg = 2; // 错误消息
};
message User
{
    uint32 id = 1;
    bytes name = 2;
    enum Gender
    {
        MALE = 0;
        FEMAILE = 1;
    }
    Gender gender = 3;
}

message GetFriendListResponse
{
    ResultCode result = 1; // 响应结果 
    repeated User friendsList = 2; // 好友列表
}


service UserServiceRpc 
{
    rpc Login(LoginRequest) returns (LoginResponse) {} // 登录接口
    rpc GetFriendList(GetFriendListRequest) returns (GetFriendListResponse) {} // 获取好友列表接口
}

option cc_generic_services = true; // 生成通用服务接口