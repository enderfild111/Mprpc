syntax = "proto3";

package example;

message ResultCode
{
    int32 errcode = 1; // 错误码
    bytes errmsg = 2; // 错误消息
}

message LoginRequest
{
    bytes name = 1; // 用户名
    bytes pwd = 2; // 密码
}

message LoginResponse
{
    ResultCode result = 1; // 响应结果
    bool success = 2; // 是否登录成功
}

message RegisterRequest
{
    uint32 id = 1;
    bytes name = 2;
    bytes pwd = 3;
}

message RegisterResponse
{
    ResultCode result = 1;
    bool success = 2;
}

service UserServiceRpc 
{
    rpc Login(LoginRequest) returns (LoginResponse) {}; // 登录接口
    rpc Register(RegisterRequest) returns (RegisterResponse) {};
}

option cc_generic_services = true; // 生成通用服务接口